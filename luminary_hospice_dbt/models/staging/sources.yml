version: 2

sources:
  - name: bronze
    database: LUMINARY_HOSPICE
    schema: BRONZE
    description: "Raw MatrixCare EMR data share - ingested with minimal transformation"
    tables:
      - name: RAW_PATIENTS
        description: "Patient demographics, payer, and physician data"
        columns:
          - name: PATIENT_ID
            description: "MatrixCare patient identifier"
          - name: MODIFIED_DATE
            description: "Last modified timestamp from source"
      - name: RAW_EPISODES
        description: "Hospice episodes with certification and benefit period data"
        columns:
          - name: EPISODE_ID
            description: "MatrixCare episode identifier"
      - name: RAW_ADMISSIONS
        description: "Admission events linked to referrals and episodes"
        columns:
          - name: ADMISSION_ID
            description: "MatrixCare admission identifier"
      - name: RAW_DISCHARGES
        description: "Discharge events with disposition and length of stay"
        columns:
          - name: DISCHARGE_ID
            description: "MatrixCare discharge identifier"
      - name: RAW_CENSUS
        description: "Daily patient census snapshots by facility"
        columns:
          - name: CENSUS_ID
            description: "MatrixCare census record identifier"
      - name: RAW_REFERRALS
        description: "Referral pipeline with conversion and outcome tracking"
        columns:
          - name: REFERRAL_ID
            description: "MatrixCare referral identifier"
      - name: RAW_FACILITIES
        description: "Facility master data with bed capacity"
        columns:
          - name: FACILITY_ID
            description: "MatrixCare facility identifier"
      - name: RAW_STAFF
        description: "Clinical staff roster by discipline and role"
        columns:
          - name: STAFF_ID
            description: "MatrixCare staff identifier"
      - name: RAW_VISITS
        description: "Visit logs by discipline with timing and mileage"
        columns:
          - name: VISIT_ID
            description: "MatrixCare visit identifier"
      - name: RAW_BILLING_CLAIMS
        description: "Claims, payments, and denial tracking"
        columns:
          - name: CLAIM_ID
            description: "MatrixCare claim identifier"
      - name: RAW_DIAGNOSES
        description: "ICD-10 diagnosis records linked to episodes"
        columns:
          - name: DIAGNOSIS_ID
            description: "MatrixCare diagnosis identifier"
      - name: RAW_CARE_PLANS
        description: "Care plan details with visit frequency and goals"
        columns:
          - name: CARE_PLAN_ID
            description: "MatrixCare care plan identifier"
      - name: RAW_MEDICATIONS
        description: "Medication orders with hospice-related flag"
        columns:
          - name: MEDICATION_ID
            description: "MatrixCare medication identifier"
      - name: RAW_CLINICAL_ASSESSMENTS
        description: "Clinical assessments including PPS scores"
        columns:
          - name: ASSESSMENT_ID
            description: "MatrixCare assessment identifier"
      - name: RAW_BUDGET
        description: "Monthly budget targets by facility for ADC, admissions, revenue"
        columns:
          - name: BUDGET_ID
            description: "Budget record identifier"

